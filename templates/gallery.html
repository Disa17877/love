<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Галерея воспоминаний ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

button{
margin:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff2f6c;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>📸 Наши воспоминания</h1>

<div class="gallery">

<img src="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?4">
<img src="https://picsum.photos/400/300?5">
<img src="https://picsum.photos/400/300?6">

</div>

<button onclick="window.location.href='/surprise/'">
⬅ Назад
</button>

</body>
</html>
