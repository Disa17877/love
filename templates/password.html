<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Page</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
font-family: Arial;
}

.container{
background:white;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff4f81;
color:white;
font-size:16px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Введите пароль от сердца Диаса ❤️</h2>

<form method="post">
{% csrf_token %}

<input type="password" name="password" placeholder="Password">

<button type="submit">Вход</button>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</form>

</div>

</body>
</html>
